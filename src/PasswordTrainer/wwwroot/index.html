<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Password Trainer</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>

    <h1>Password Trainer</h1>

    <form autocomplete="off" id="form">
      <label for="pin">App PIN:</label>
      <input id="pin" required type="password">

      <label for="id">Password ID / Label:</label>
      <input id="id" placeholder="e.g., mail, vpn" required type="text">

      <label for="pw">Password:</label>
      <input id="pw" required type="password">

      <button type="submit">Check Password</button>
    </form>

    <div id="result"></div>

    <script src="app.js"></script>
  </body>
</html>
