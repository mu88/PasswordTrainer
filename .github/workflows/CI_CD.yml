name: Combined CI / Release

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  shared_ci_cd:
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    uses: mu88/common/.github/workflows/ci-cd.yml@74ae161be67791a743a890c0a0ee2a2088ef1042
    with:
      docker-attest-provenance-and-sbom: true
      docker-publish-project: src/PasswordTrainer/PasswordTrainer.csproj
      sonar-additional-params: '/d:sonar.coverage.exclusions=**/wwwroot/**' # exclude static JS files
      sonar-key: mu88_PasswordTrainer
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
